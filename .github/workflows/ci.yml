name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — type-check & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend-next

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          # Dummy value so the rewrite config resolves without error
          BACKEND_URL: http://localhost:8000

  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend — import & syntax check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install production dependencies
        run: pip install -r requirements-prod.txt

      - name: Syntax check (py_compile)
        run: python -m py_compile main.py spotify.py lyrics.py translator.py

      - name: Import check (core modules only)
        run: |
          python - <<'EOF'
          import fastapi, uvicorn, pydantic, requests
          from sse_starlette.sse import EventSourceResponse
          print("All core imports OK")
          EOF

  # ── Deploy previews (Vercel + Railway auto-deploy on push, no extra step needed) ──
  notify:
    name: Deployment triggered
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    steps:
      - name: Summary
        run: |
          echo "✅ CI passed — Vercel and Railway will auto-deploy from this push."
          echo "Frontend: https://your-tamtan.vercel.app"
          echo "Backend:  https://your-tamtan-backend.railway.app"
