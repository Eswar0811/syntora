services:
  - type: web
    name: syntora-backend
    runtime: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1 --log-level info
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: PYTHONDONTWRITEBYTECODE
        value: "1"
      # Set these as secret env vars in the Render dashboard:
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: SPOTIFY_REDIRECT_URI
        value: "https://syntora-71a2.onrender.com/callback"
      - key: FRONTEND_URL
        value: "https://syntora-app.vercel.app"
      - key: ALLOWED_ORIGINS
        value: "https://syntora-app.vercel.app"
      - key: RENDER_EXTERNAL_URL
        value: "https://syntora-71a2.onrender.com"
